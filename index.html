<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Air Drawing App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #0a0a0a;
  font-family: Arial;
  color: white;
}

#canvas {
  position: absolute;
  top: 0;
  left: 0;
}

.controls {
  position: fixed;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.6);
  padding: 10px;
  border-radius: 10px;
}

input {
  margin: 5px 0;
}
</style>
</head>

<body>

<video id="video" style="display:none;" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div class="controls">
  <label>Color:</label><br>
  <input type="color" id="colorPicker" value="#00ffff"><br>
  
  <label>Brush:</label><br>
  <input type="range" id="brushSize" min="1" max="20" value="5">
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let drawing = false;
let lastX = null;
let lastY = null;

const colorPicker = document.getElementById('colorPicker');
const brushSize = document.getElementById('brushSize');

function draw(x, y) {
  if (!drawing) return;

  ctx.strokeStyle = colorPicker.value;
  ctx.lineWidth = brushSize.value;
  ctx.lineCap = "round";

  ctx.shadowBlur = 20;
  ctx.shadowColor = colorPicker.value;

  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.stroke();

  lastX = x;
  lastY = y;
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// Gesture detection
function getGesture(landmarks) {
  const tips = [8, 12, 16, 20]; // fingers
  let extended = 0;

  tips.forEach(i => {
    if (landmarks[i].y < landmarks[i - 2].y) extended++;
  });

  if (extended === 1) return "draw";
  if (extended === 4) return "erase";
  if (extended === 0) return "pause";

  return "none";
}

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {
  if (results.multiHandLandmarks.length > 0) {
    const landmarks = results.multiHandLandmarks[0];
    const gesture = getGesture(landmarks);

    const index = landmarks[8];
    const x = index.x * canvas.width;
    const y = index.y * canvas.height;

    if (gesture === "draw") {
      drawing = true;
      if (lastX === null) {
        lastX = x;
        lastY = y;
      }
      draw(x, y);
    } 
    else if (gesture === "erase") {
      clearCanvas();
      drawing = false;
      lastX = null;
      lastY = null;
    } 
    else if (gesture === "pause") {
      drawing = false;
      lastX = null;
      lastY = null;
    }
  }
});

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({image: video});
  },
  width: 640,
  height: 480
});

camera.start();
</script>

</body>
</html>
